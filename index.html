<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍑 屁桃星聊天站 v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D0B1A;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --border-warm:rgba(212,184,150,0.2);--gold:#D4B896;--warm:#C4A882;
  --soft:rgba(212,184,150,0.5);--pink:#E8A0BF;--glow:#FFB07C;
  --grad:linear-gradient(135deg,#E8A0BF 0%,#FFB07C 100%);
  --sidebar-w:280px;
}
body{font-family:'Noto Serif SC',-apple-system,sans-serif;background:var(--bg);color:var(--gold);height:100vh;height:100dvh;overflow:hidden}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:rgba(212,184,150,0.15);border-radius:50%;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.8}}

/* Layout */
.page{position:relative;z-index:1;height:100vh;height:100dvh}
.settings-page{display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;min-height:100vh;min-height:100dvh}
.app-page{display:none;height:100vh;height:100dvh;position:relative}
.app-page.active{display:flex}
.hidden{display:none!important}

/* ===== SIDEBAR ===== */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none}
.sidebar-overlay.active{display:block}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:#12101F;border-right:1px solid var(--border);z-index:51;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-size:15px;font-weight:700;letter-spacing:2px}
.sb-close{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer;padding:4px}
.sb-new{margin:10px 12px;padding:12px;border-radius:14px;border:1px dashed var(--border-warm);background:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:background .2s}
.sb-new:active{background:rgba(255,255,255,.05)}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px;-webkit-overflow-scrolling:touch}
.sb-item{padding:12px;border-radius:12px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:10px;transition:background .15s}
.sb-item:active{background:rgba(255,255,255,.04)}
.sb-item.active{background:rgba(232,160,191,.06);border-color:rgba(232,160,191,.15)}
.sb-item-info{flex:1;min-width:0}
.sb-item-title{font-size:13px;font-weight:600;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-meta{font-size:10px;color:var(--soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-del{background:none;border:none;font-size:14px;color:var(--soft);cursor:pointer;padding:4px 6px;border-radius:6px;flex-shrink:0;opacity:.5}
.sb-item-del:active{opacity:1;color:#E88B8B}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sb-foot-btn{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--soft);font-size:12px;cursor:pointer;font-family:inherit;text-align:center}
.sb-foot-btn:active{color:var(--glow)}

/* ===== CHAT AREA ===== */
.chat-area{flex:1;display:flex;flex-direction:column;height:100%;min-width:0}

/* Chat header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(13,11,26,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.h-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:8px;color:var(--soft);flex-shrink:0}
.h-btn:active{color:var(--glow)}
.h-center{flex:1;text-align:center;min-width:0}
.h-model{font-size:12px;font-weight:600;color:var(--warm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.h-model:active{color:var(--glow)}
.h-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--pink);box-shadow:0 0 6px rgba(232,160,191,.5);margin-right:6px;vertical-align:middle;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:16px 10px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;margin-top:22%}
.empty-e{font-size:44px;display:block;margin-bottom:12px}
.empty-t{font-size:17px;font-weight:700;letter-spacing:3px;margin-bottom:6px}
.empty-h{font-size:13px;color:var(--soft)}
.empty-l{width:36px;height:2px;margin:12px auto;background:var(--grad);border-radius:1px}
.msg-row{display:flex;align-items:flex-start;gap:6px}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.avatar{font-size:20px;flex-shrink:0;margin-top:4px}
.msg-wrap{max-width:80%;display:flex;flex-direction:column}
.bubble{padding:10px 14px;font-size:14px;line-height:1.7;word-break:break-word}
.bubble.user{background:var(--grad);color:#1a1020;border-radius:18px 18px 4px 18px;box-shadow:0 2px 10px rgba(232,160,191,.2);font-weight:500}
.bubble.bot{background:var(--card);color:var(--gold);border-radius:18px 18px 18px 4px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.2)}

/* Thinking block */
.think-block{margin-bottom:6px;border-radius:14px;border:1px solid rgba(232,160,191,.12);overflow:hidden}
.think-toggle{width:100%;padding:8px 12px;background:rgba(232,160,191,.05);border:none;color:var(--pink);font-size:12px;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;font-weight:600}
.think-toggle:active{background:rgba(232,160,191,.1)}
.think-content{padding:10px 12px;font-size:12px;line-height:1.6;color:var(--soft);display:none;border-top:1px solid rgba(232,160,191,.08);max-height:300px;overflow-y:auto}
.think-content.open{display:block}

/* Markdown */
.bubble.bot p{margin:0 0 8px}.bubble.bot p:last-child{margin-bottom:0}
.bubble.bot strong{color:var(--glow);font-weight:700}
.bubble.bot em{color:var(--pink)}
.bubble.bot code{background:rgba(255,255,255,.07);padding:1px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',monospace}
.bubble.bot pre{background:rgba(255,255,255,.05);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid var(--border)}
.bubble.bot pre code{background:none;padding:0;font-size:12px}
.bubble.bot ul,.bubble.bot ol{margin:6px 0;padding-left:20px}
.bubble.bot li{margin:3px 0}
.bubble.bot blockquote{border-left:2px solid var(--pink);padding-left:10px;margin:6px 0;color:var(--warm)}
.bubble.bot hr{border:none;height:1px;background:var(--border);margin:10px 0}

/* Message meta & actions */
.msg-meta{font-size:10px;color:var(--soft);margin-top:4px;padding:0 4px}
.msg-acts{display:flex;gap:2px;margin-top:3px;padding:0 2px}
.msg-acts button{background:none;border:none;font-size:13px;cursor:pointer;padding:2px 5px;border-radius:6px;color:var(--soft)}
.msg-acts button:active{color:var(--glow)}
.msg-img{max-width:200px;max-height:200px;border-radius:12px;margin-top:6px;border:1px solid var(--border)}

/* Copy toast */
.copy-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(232,160,191,.9);color:#1a1020;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;font-family:inherit;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.copy-toast.show{opacity:1}

/* Loading */
.ldots{letter-spacing:4px}
.ldots span{animation:blink 1.4s infinite both;font-size:14px;color:var(--pink)}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.err-bub{background:rgba(232,139,139,.1);border-radius:12px;padding:8px 14px;border:1px solid rgba(232,139,139,.2);font-size:13px;color:#E88B8B}

/* Input area */
.inp-area{padding:6px 10px calc(env(safe-area-inset-bottom,8px) + 6px);background:rgba(13,11,26,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);flex-shrink:0}
.att-prev{display:flex;gap:6px;padding:4px 4px 6px;flex-wrap:wrap}
.att-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.att-item img{width:48px;height:48px;object-fit:cover;display:block}
.att-item .ftag{padding:6px 10px;font-size:11px;color:var(--warm);background:var(--card);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-rm{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:rgba(232,139,139,.9);color:#fff;font-size:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.inp-row{display:flex;align-items:flex-end;gap:8px}
.att-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--soft)}
.att-btn:active{color:var(--glow)}
.c-inp{flex:1;padding:10px 14px;border-radius:16px;border:1px solid var(--border-warm);font-size:14px;outline:none;background:rgba(255,255,255,.03);color:var(--gold);resize:none;font-family:inherit;line-height:1.5;max-height:100px}
.c-inp::placeholder{color:var(--soft)}
.c-inp:focus{border-color:var(--pink)}
.snd-btn{width:38px;height:38px;border-radius:12px;border:none;background:var(--grad);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(232,160,191,.25)}
.snd-btn:disabled{opacity:.3}
.snd-btn:active{transform:scale(.93)}
.sig{text-align:center;padding:4px 0 1px;font-size:9px;color:var(--soft);letter-spacing:2px}

/* Settings Card */
.s-card{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:24px;padding:32px 20px;width:100%;max-width:420px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.logo-area{text-align:center;margin-bottom:28px}
.logo{font-size:52px;display:block;margin-bottom:8px}
.title{font-size:20px;font-weight:700;letter-spacing:4px}
.subtitle{font-size:11px;color:var(--soft);letter-spacing:2px;margin-top:4px}
.field{margin-bottom:18px}
.label{display:block;font-size:13px;font-weight:600;color:var(--warm);margin-bottom:6px}
.inp,.txa{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border-warm);font-size:14px;outline:none;background:rgba(255,255,255,.03);color:var(--gold);font-family:inherit;transition:border-color .3s}
.inp:focus,.txa:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(232,160,191,.1)}
.inp::placeholder,.txa::placeholder{color:var(--soft)}
.txa{resize:vertical;line-height:1.6;margin-top:6px}
.hint{font-size:11px;color:var(--soft);margin-top:4px}
.hint a{color:var(--glow);text-decoration:none}
.toggle-btn{background:none;border:none;font-size:13px;font-weight:600;color:var(--soft);cursor:pointer;font-family:inherit;padding:4px 0}
.start-btn{width:100%;padding:15px;border-radius:20px;border:none;background:var(--grad);color:#1a1020;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(232,160,191,.25);font-family:inherit;transition:transform .15s}
.start-btn:active{transform:scale(.97)}
.err-msg{color:#E88B8B;font-size:13px;text-align:center;margin-top:10px}

/* Model selector button */
.model-btn{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center}

/* Sliders */
.slider-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border-warm);outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--grad);cursor:pointer;box-shadow:0 2px 6px rgba(232,160,191,.3)}
.slider-val{font-size:13px;color:var(--glow);min-width:32px;text-align:right;font-weight:600}
.slider-hint{font-size:11px;color:var(--soft);margin-top:2px}

/* Thinking mode toggle */
.think-row{display:flex;align-items:center;gap:10px;margin-top:8px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--card)}
.think-sw{position:relative;width:44px;height:24px;flex-shrink:0}
.think-sw input{opacity:0;width:0;height:0}
.think-sw .sw-track{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:12px;cursor:pointer;transition:background .2s}
.think-sw input:checked+.sw-track{background:rgba(232,160,191,.4)}
.think-sw .sw-dot{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.think-sw input:checked~.sw-dot{transform:translateX(20px)}
.think-label{flex:1;font-size:13px;color:var(--gold);font-weight:600}
.think-intensity{margin-top:8px;display:flex;gap:6px}
.think-opt{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--soft);font-size:12px;font-family:inherit;cursor:pointer;text-align:center;font-weight:600;transition:all .2s}
.think-opt.active{border-color:var(--pink);color:var(--pink);background:rgba(232,160,191,.06)}
.think-opt:active{background:rgba(255,255,255,.05)}

/* Model search overlay */
.mo{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column}
.mo.active{display:flex}
.mo-head{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.mo-close{background:none;border:none;font-size:22px;color:var(--soft);cursor:pointer;padding:4px}
.mo-inp{flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;outline:none;font-family:inherit}
.mo-inp::placeholder{color:var(--soft)}
.mo-inp:focus{border-color:var(--pink)}
.mo-list{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.mo-item{padding:12px 14px;border-radius:12px;border:1px solid transparent;cursor:pointer;margin-bottom:4px;transition:background .2s}
.mo-item:active{background:rgba(255,255,255,.05);border-color:var(--border)}
.mo-item.sel{border-color:var(--pink);background:rgba(232,160,191,.05)}
.mo-name{font-size:14px;font-weight:600;color:var(--gold)}
.mo-meta{font-size:11px;color:var(--soft);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.mo-free{color:#7CDB8A;font-weight:600}
.mo-loading{text-align:center;padding:40px;color:var(--soft);font-size:14px}

/* Overlays */
.ov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px}
.ov.active{display:flex}
.ov-box{background:#1a1525;border-radius:20px;padding:20px;width:100%;max-width:400px;border:1px solid var(--border)}
.ov-box h3{font-size:15px;color:var(--gold);margin-bottom:12px;font-weight:600}
.ov-box textarea{width:100%;min-height:100px;padding:12px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.ov-box textarea:focus{border-color:var(--pink)}
.ov-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.ov-btns button{padding:8px 16px;border-radius:10px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-cancel{background:var(--card);color:var(--soft);border:1px solid var(--border)!important}
.btn-ok{background:var(--grad);color:#1a1020}

/* Confirm dialog */
.confirm-box{background:#1a1525;border-radius:20px;padding:24px 20px;width:100%;max-width:320px;border:1px solid var(--border);text-align:center}
.confirm-box .confirm-icon{font-size:36px;display:block;margin-bottom:10px}
.confirm-box .confirm-text{font-size:14px;color:var(--gold);margin-bottom:8px;line-height:1.6}
.confirm-box .confirm-sub{font-size:12px;color:var(--soft);margin-bottom:16px}

/* Menu sheet */
.menu-ov{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
.menu-ov.active{display:flex}
.menu-sh{background:#1a1525;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:420px;border-top:1px solid var(--border)}
.menu-sh h3{font-size:15px;color:var(--gold);margin-bottom:14px;text-align:center}
.m-item{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--gold);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px;text-align:center}
.m-item:active{background:rgba(255,255,255,.07)}
.m-close{width:100%;padding:14px;border-radius:12px;border:none;background:rgba(232,139,139,.15);color:#E88B8B;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;text-align:center}

/* Conversation settings overlay */
.conv-settings{padding:16px;max-height:70vh;overflow-y:auto}
.conv-settings .field{margin-bottom:14px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- ===== SETTINGS PAGE ===== -->
<div class="settings-page page" id="SP">
 <div class="s-card">
  <div class="logo-area">
   <span class="logo">🍑</span>
   <h1 class="title">屁 桃 星 聊 天 站</h1>
   <p class="subtitle">Yoru × 屁屁 · v3</p>
  </div>
  <div class="field">
   <label class="label">🔑 API Key</label>
   <input type="password" id="apiKey" class="inp" placeholder="sk-or-...">
   <p class="hint">去 <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai</a> 获取</p>
  </div>
  <div class="field">
   <label class="label">🍑 默认模型</label>
   <button class="model-btn" id="mBtn" onclick="openMO()">
    <span id="mBtnN">点击搜索模型…</span>
    <span style="color:var(--soft)">🔍</span>
   </button>
   <p class="hint">新对话的默认模型，进入后每个对话可单独切换</p>
  </div>
  <div class="field">
   <button class="toggle-btn" id="paramToggle" onclick="togglePanel('paramPanel','paramToggle','生成参数')">▶ 生成参数</button>
   <div id="paramPanel" style="display:none;margin-top:10px">
    <label class="label" style="font-size:12px">🌡️ Temperature</label>
    <div class="slider-row">
     <input type="range" id="tempSlider" min="0" max="200" value="70" oninput="updateSlider('temp')">
     <span class="slider-val" id="tempVal">0.7</span>
    </div>
    <p class="slider-hint">0 = 最稳定 · 0.7 = 日常聊天 · 1.5+ = 很有创意但可能跑偏</p>
    <label class="label" style="font-size:12px;margin-top:12px">🎯 Top P</label>
    <div class="slider-row">
     <input type="range" id="topPSlider" min="0" max="100" value="100" oninput="updateSlider('topP')">
     <span class="slider-val" id="topPVal">1.0</span>
    </div>
    <label class="label" style="font-size:12px;margin-top:12px">📏 Max Tokens</label>
    <div class="slider-row">
     <input type="range" id="maxTokSlider" min="256" max="16384" value="4096" step="256" oninput="updateSlider('maxTok')">
     <span class="slider-val" id="maxTokVal">4096</span>
    </div>
   </div>
  </div>
  <div class="field">
   <button class="toggle-btn" id="sysToggle" onclick="togglePanel('sys','sysToggle','系统提示词')">▶ 系统提示词</button>

<script>
marked.setOptions({breaks:true,gfm:true});

// ============================
// STATE
// ============================
let convs=[];        // all conversations
let curId=null;      // current conversation id
let atts=[];
let allM=[];
let loading=false;
let lastErr='';
let editIdx=-1;
let mLoaded=false;
let moTarget='global'; // 'global' or 'conv'

// confirm state
let cfmAction=null;
let cfmData=null;

// defaults
let gParams={temp:0.7,topP:1.0,maxTok:4096};
let gModel=null;

const $=id=>document.getElementById(id);
function uid(){return Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6)}

// ============================
// CURRENT CONVERSATION HELPERS
// ============================
function curConv(){return convs.find(c=>c.id===curId)||null}
function curMsgs(){const c=curConv();return c?c.messages:[]}
function curModel(){const c=curConv();return c&&c.model?c.model:gModel}

// ============================
// PERSISTENCE
// ============================
function saveGlobal(){
  try{localStorage.setItem('ps3_g',JSON.stringify({k:$('apiKey').value,sp:$('sys').value,m:gModel,p:gParams}))}catch(e){}
}
function saveConvs(){
  try{
    // Save conversations but limit message storage
    const lite=convs.map(c=>({...c,messages:c.messages.slice(-200)}));
    localStorage.setItem('ps3_c',JSON.stringify(lite));
  }catch(e){}
}
function saveAll(){saveGlobal();saveConvs()}

// ============================
// INIT
// ============================
(function(){
  // Stars
  const c=$('stars');for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*2+2}s`;c.appendChild(s)}
  // Load global
  try{
    const g=JSON.parse(localStorage.getItem('ps3_g')||'{}');
    if(g.k)$('apiKey').value=g.k;
    if(g.sp)$('sys').value=g.sp;
    if(g.m){gModel=g.m;$('mBtnN').textContent=g.m.name||g.m.id}
    if(g.p){
      gParams=g.p;
      $('tempSlider').value=Math.round(gParams.temp*100);$('tempVal').textContent=gParams.temp.toFixed(1);
      $('topPSlider').value=Math.round(gParams.topP*100);$('topPVal').textContent=gParams.topP.toFixed(1);
      $('maxTokSlider').value=gParams.maxTok;$('maxTokVal').textContent=gParams.maxTok;
    }
  }catch(e){}
  // Load convs
  try{convs=JSON.parse(localStorage.getItem('ps3_c')||'[]')}catch(e){convs=[]}
  if(convs.length)curId=convs[0].id;
})();

// ============================
// SLIDERS
// ============================
function updateSlider(w){
  if(w==='temp'){gParams.temp=$('tempSlider').value/100;$('tempVal').textContent=gParams.temp.toFixed(1)}
  else if(w==='topP'){gParams.topP=$('topPSlider').value/100;$('topPVal').textContent=gParams.topP.toFixed(1)}
  else if(w==='maxTok'){gParams.maxTok=parseInt($('maxTokSlider').value);$('maxTokVal').textContent=gParams.maxTok}
  saveGlobal();
}
function togglePanel(panelId,btnId,label){
  const p=$(panelId),b=$(btnId);
  if(p.style.display==='none'){p.style.display='block';b.textContent='▼ '+label}
  else{p.style.display='none';b.textContent='▶ '+label}
}

// ============================
// MODEL SEARCH
// ============================
async function loadM(){
  if(mLoaded&&allM.length)return;
  $('moL').innerHTML='<div class="mo-loading">正在加载模型列表… 🍑</div>';
  try{
    const r=await fetch('https://openrouter.ai/api/v1/models');const d=await r.json();
    allM=(d.data||[]).map(m=>({
      id:m.id,name:m.name||m.id,
      pp:parseFloat(m.pricing?.prompt||0),cp:parseFloat(m.pricing?.completion||0),
      ctx:m.context_length||0,
      free:parseFloat(m.pricing?.prompt||0)===0&&parseFloat(m.pricing?.completion||0)===0
    })).sort((a,b)=>a.name.localeCompare(b.name));
    mLoaded=true;filterM();
  }catch(e){$('moL').innerHTML='<div class="mo-loading">加载失败 😣</div>'}
}
function filterM(){
  const q=$('moInp').value.toLowerCase().trim();
  const cur=moTarget==='conv'?curModel():gModel;
  let list=allM;
  if(q)list=allM.filter(m=>m.id.toLowerCase().includes(q)||m.name.toLowerCase().includes(q));
  const show=list.slice(0,50);
  const el=$('moL');el.innerHTML=show.length?'':'<div class="mo-loading">没有找到匹配的模型</div>';
  show.forEach(m=>{
    const d=document.createElement('div');
    d.className='mo-item'+(cur&&cur.id===m.id?' sel':'');
    const pr=m.free?'<span class="mo-free">🆓 免费</span>':`$${(m.pp*1e6).toFixed(2)} / $${(m.cp*1e6).toFixed(2)} per 1M`;
    const cx=m.ctx?(m.ctx>=1e6?`${(m.ctx/1e6).toFixed(0)}M`:m.ctx>=1e3?`${(m.ctx/1e3).toFixed(0)}K`:m.ctx)+' ctx':'';
    d.innerHTML=`<div class="mo-name">${esc(m.name)}</div><div class="mo-meta">${pr}<span>${cx}</span></div>`;
    d.onclick=()=>{
      if(moTarget==='conv'){
        const c=curConv();if(c){c.model=m;saveConvs();$('convModelN').textContent=m.name;updateHeader()}
      }else{gModel=m;$('mBtnN').textContent=m.name;saveGlobal()}
      closeMO();
    };
    el.appendChild(d);
  });
  if(list.length>50){const x=document.createElement('div');x.className='mo-loading';x.textContent=`还有 ${list.length-50} 个，请缩小搜索`;el.appendChild(x)}
}
function openMO(target){moTarget=target||'global';$('MO').classList.add('active');$('moInp').value='';loadM();setTimeout(()=>$('moInp').focus(),100)}
function closeMO(){$('MO').classList.remove('active')}

// ============================
// ENTER APP
// ============================
function enterApp(){
  if(!$('apiKey').value.trim()){$('sErr').textContent='请先填入 API Key 🍑';return}
  if(!gModel){$('sErr').textContent='请先选择默认模型 🍑';return}
  $('sErr').textContent='';saveGlobal();
  // Create first conv if none
  if(!convs.length)newConvSilent();
  $('SP').classList.add('hidden');$('AP').classList.add('active');
  updateHeader();renderSB();render();$('cInp').focus();
}
function backToSettings(){closeSB();$('AP').classList.remove('active');$('SP').classList.remove('hidden')}

// ============================
// SIDEBAR
// ============================
function openSB(){$('SB').classList.add('open');$('sbOv').classList.add('active');renderSB()}
function closeSB(){$('SB').classList.remove('open');$('sbOv').classList.remove('active')}

function renderSB(){
  const el=$('sbList');el.innerHTML='';
  convs.forEach(c=>{
    const d=document.createElement('div');
    d.className='sb-item'+(c.id===curId?' active':'');
    const title=c.title||'新对话';
    const model=c.model?c.model.name:'默认模型';
    const count=c.messages.length;
    d.innerHTML=`<div class="sb-item-info"><div class="sb-item-title">${esc(title)}</div><div class="sb-item-meta">${esc(model)} · ${count}条</div></div><button class="sb-item-del" onclick="event.stopPropagation();askDelConv('${c.id}')">🗑️</button>`;
    d.onclick=()=>{switchConv(c.id);closeSB()};
    el.appendChild(d);
  });
}

function newConvSilent(){
  const c={id:uid(),title:'',model:gModel?{...gModel}:null,messages:[],thinking:{on:false,intensity:'medium'},createdAt:Date.now(),updatedAt:Date.now()};
  convs.unshift(c);curId=c.id;saveConvs();
}
function newConv(){
  newConvSilent();lastErr='';loading=false;
  updateHeader();renderSB();render();closeSB();$('cInp').focus();
}
function switchConv(id){
  curId=id;lastErr='';loading=false;
  updateHeader();render();
}
function updateHeader(){
  const m=curModel();
  $('hM').textContent=m?m.name:'未选择模型';
}

// Delete conversation with confirm
function askDelConv(id){
  const c=convs.find(x=>x.id===id);
  if(!c)return;
  cfmAction='delConv';cfmData=id;
  $('cfmIcon').textContent='🍑';
  $('cfmText').textContent=`删除对话「${c.title||'新对话'}」？`;
  $('cfmSub').textContent='删除后无法恢复哦';
  $('cfmBtn').textContent='确认删除';
  $('cfmOv').classList.add('active');
}

// ============================
// CONFIRM SYSTEM
// ============================
function closeCfm(){$('cfmOv').classList.remove('active');cfmAction=null;cfmData=null}
function doCfm(){
  if(cfmAction==='delConv')doDelConv();
  else if(cfmAction==='delMsg')doDelMsg();
  else if(cfmAction==='regen')doRegen();
  closeCfm();
}

function doDelConv(){
  const id=cfmData;
  convs=convs.filter(c=>c.id!==id);
  if(curId===id){curId=convs.length?convs[0].id:null;if(!convs.length)newConvSilent()}
  saveConvs();updateHeader();renderSB();render();
}

// ============================
// CONVERSATION SETTINGS
// ============================
function openConvSettings(){
  const c=curConv();if(!c)return;
  $('convModelN').textContent=c.model?c.model.name:'使用默认模型';
  $('thinkOn').checked=c.thinking?.on||false;
  onThinkToggle();
  const int=c.thinking?.intensity||'medium';
  setThinkIntUI(int);
  updateThinkHint();
  $('convSetOv').classList.add('active');
}
function closeConvSet(){$('convSetOv').classList.remove('active')}
function saveConvSet(){
  const c=curConv();if(!c)return;
  c.thinking={on:$('thinkOn').checked,intensity:getThinkInt()};
  saveConvs();updateHeader();closeConvSet();
}

function onThinkToggle(){
  const on=$('thinkOn').checked;
  $('thinkLabel').textContent=on?'开启':'关闭';
  $('thinkIntPanel').style.display=on?'flex':'none';
  updateThinkHint();
}
function getThinkInt(){
  const el=document.querySelector('.think-opt.active');
  return el?el.dataset.v:'medium';
}
function setThinkInt(v){setThinkIntUI(v);updateThinkHint()}
function setThinkIntUI(v){
  document.querySelectorAll('.think-opt').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
}
function updateThinkHint(){
  const m=curModel();
  if(!m){$('thinkHint').textContent='';return}
  const id=m.id.toLowerCase();
  const isClaude=id.includes('claude')||id.includes('anthropic');
  const isO=id.includes('/o3')||id.includes('/o4')||id.includes('/o1');
  if(isClaude)$('thinkHint').textContent='Claude模型：使用 extended thinking（思考预算token）';
  else if(isO)$('thinkHint').textContent='GPT o系列：使用 reasoning_effort（low/medium/high）';
  else $('thinkHint').textContent='此模型可能不支持思考模式';
}

// ============================
// THINKING MODE HELPERS
// ============================
function isClaude(mid){const l=mid.toLowerCase();return l.includes('claude')||l.includes('anthropic')}
function isOModel(mid){const l=mid.toLowerCase();return l.includes('/o3')||l.includes('/o4')||l.includes('/o1')}

function thinkBudget(intensity){
  return{light:5000,medium:10000,deep:25000}[intensity]||10000;
}
function reasonEffort(intensity){
  return{light:'low',medium:'medium',deep:'high'}[intensity]||'medium';
}

// ============================
// ATTACHMENTS
// ============================
const TEXT_EXTS=['.txt','.md','.json','.csv','.xml','.html','.htm','.css','.js','.ts','.jsx','.tsx','.py','.java','.c','.cpp','.h','.rb','.go','.rs','.swift','.kt','.sql','.sh','.bash','.yaml','.yml','.toml','.ini','.cfg','.log','.r','.lua','.php','.vue','.svelte'];
function getFileType(f){
  if(f.type.startsWith('image/'))return'image';
  const ext='.'+f.name.split('.').pop().toLowerCase();
  if(TEXT_EXTS.includes(ext)||f.type.startsWith('text/'))return'text';
  if(ext==='.pdf'||f.type==='application/pdf')return'pdf';
  return'unknown';
}
function handleF(inp){
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();const ft=getFileType(f);
    if(ft==='image'){r.onload=e=>{atts.push({type:'image',name:f.name,data:e.target.result});renderAtt()};r.readAsDataURL(f)}
    else if(ft==='pdf'){r.onload=e=>{atts.push({type:'pdf',name:f.name,data:e.target.result});renderAtt()};r.readAsDataURL(f)}
    else if(ft==='text'){r.onload=e=>{atts.push({type:'text',name:f.name,data:e.target.result});renderAtt()};r.readAsText(f)}
    else{atts.push({type:'unsupported',name:f.name,data:`[不支持: ${f.name}]`});renderAtt()}
  });inp.value='';
}
function renderAtt(){
  const el=$('attP');el.innerHTML='';
  atts.forEach((a,i)=>{
    const d=document.createElement('div');d.className='att-item';
    if(a.type==='image')d.innerHTML=`<img src="${a.data}"><button class="att-rm" onclick="rmAtt(${i})">✕</button>`;
    else if(a.type==='unsupported')d.innerHTML=`<div class="ftag" style="color:#E88B8B">⚠️ ${esc(a.name)}</div><button class="att-rm" onclick="rmAtt(${i})">✕</button>`;
    else d.innerHTML=`<div class="ftag">📄 ${esc(a.name)}</div><button class="att-rm" onclick="rmAtt(${i})">✕</button>`;
    el.appendChild(d);
  });
}
function rmAtt(i){atts.splice(i,1);renderAtt()}

// ============================
// BUILD API
// ============================
function buildApi(msgs){
  const api=[];const sp=$('sys').value.trim();
  if(sp)api.push({role:'system',content:sp});
  msgs.forEach(msg=>{
    if(msg.role==='user'&&msg.atts&&msg.atts.length){
      const c=[];
      if(msg.content)c.push({type:'text',text:msg.content});
      msg.atts.forEach(a=>{
        if(a.type==='image')c.push({type:'image_url',image_url:{url:a.data}});
        else if(a.type==='text')c.push({type:'text',text:`[文件: ${a.name}]\n${a.data}`});
      });
      api.push({role:'user',content:c});
    }else{
      api.push({role:msg.role,content:msg.content});
    }
  });
  return api;
}

// ============================
// SEND
// ============================
async function send(){
  const text=$('cInp').value.trim();
  if((!text&&!atts.length)||loading)return;
  const c=curConv();if(!c)return;
  const validAtts=atts.filter(a=>a.type!=='unsupported');
  c.messages.push({role:'user',content:text,atts:validAtts.length?[...validAtts]:undefined,ts:Date.now()});
  // Auto title from first message
  if(!c.title&&text)c.title=text.slice(0,24)+(text.length>24?'…':'');
  atts=[];renderAtt();$('cInp').value='';$('cInp').style.height='auto';
  lastErr='';loading=true;$('sndBtn').disabled=true;render();renderSB();
  await callApi(c);
  loading=false;$('sndBtn').disabled=false;render();$('cInp').focus();
}

async function callApi(c){
  const m=c.model||gModel;
  if(!m){lastErr='请先选择模型';return}
  try{
    const body={model:m.id,messages:buildApi(c.messages),max_tokens:gParams.maxTok};
    if(gParams.temp!==0.7)body.temperature=gParams.temp;
    if(gParams.topP!==1.0)body.top_p=gParams.topP;

    // Thinking mode
    if(c.thinking?.on){
      const mid=m.id;
      if(isClaude(mid)){
        // Claude extended thinking via OpenRouter
        body.thinking={type:'enabled',budget_tokens:thinkBudget(c.thinking.intensity)};
        // Claude thinking needs higher max_tokens
        body.max_tokens=Math.max(body.max_tokens,thinkBudget(c.thinking.intensity)+4096);
      }else if(isOModel(mid)){
        // GPT o-series reasoning
        body.reasoning_effort=reasonEffort(c.thinking.intensity);
      }
    }

    const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+$('apiKey').value.trim(),'Content-Type':'application/json','HTTP-Referer':location.href},
      body:JSON.stringify(body)
    });
    if(!r.ok){let e=`API错误(${r.status})`;try{const d=await r.json();if(d?.error?.message)e=d.error.message}catch(x){}throw new Error(e)}
    const d=await r.json();

    // Parse response - handle thinking content
    let reply='',thinking='';
    const choice=d.choices?.[0];
    if(choice?.message?.content){
      // Could be string or array (with thinking blocks)
      if(typeof choice.message.content==='string'){
        reply=choice.message.content;
      }else if(Array.isArray(choice.message.content)){
        choice.message.content.forEach(block=>{
          if(block.type==='thinking')thinking+=block.thinking||'';
          else if(block.type==='text')reply+=block.text||'';
        });
      }
    }
    if(!reply)reply='（没有收到回复…）';

    const u=d.usage||{};const pt=u.prompt_tokens||0,ct=u.completion_tokens||0;
    const cost=pt*m.pp+ct*m.cp;
    const msg={role:'assistant',content:reply,model:m.name,mid:m.id,tok:{p:pt,c:ct,t:pt+ct},cost,ts:Date.now()};
    if(thinking)msg.thinking=thinking;
    c.messages.push(msg);
    c.updatedAt=Date.now();
    saveConvs();
  }catch(e){lastErr=e.message||'连接出了问题'}
}

// ============================
// MSG ACTIONS
// ============================
// Edit
function openEdit(i){editIdx=i;$('editTA').value=curMsgs()[i]?.content||'';$('editOv').classList.add('active');$('editTA').focus()}
function closeEdit(){$('editOv').classList.remove('active');editIdx=-1}
async function saveEdit(){
  if(editIdx<0)return;const c=curConv();if(!c)return;
  const t=$('editTA').value.trim();if(!t){closeEdit();return}
  c.messages[editIdx].content=t;c.messages.splice(editIdx+1);closeEdit();
  lastErr='';loading=true;$('sndBtn').disabled=true;render();
  await callApi(c);loading=false;$('sndBtn').disabled=false;render();
}

// Delete msg with confirm
function askDelMsg(i){
  const msgs=curMsgs();const m=msgs[i];if(!m)return;
  cfmAction='delMsg';cfmData=i;
  if(m.role==='user'){
    const hasReply=msgs[i+1]&&msgs[i+1].role==='assistant';
    $('cfmText').textContent='删除这条消息？';
    $('cfmSub').textContent=hasReply?'屁屁的回复也会一起消失哦 🍑':'';
  }else{
    $('cfmText').textContent='删除屁屁的这条回复？';
    $('cfmSub').textContent='';
  }
  $('cfmIcon').textContent='🍑';
  $('cfmBtn').textContent='确认删除';
  $('cfmOv').classList.add('active');
}
function doDelMsg(){
  const c=curConv();if(!c)return;
  const i=cfmData;const m=c.messages[i];
  if(m&&m.role==='user'&&c.messages[i+1]&&c.messages[i+1].role==='assistant'){
    c.messages.splice(i,2);
  }else{
    c.messages.splice(i,1);
  }
  saveConvs();render();
}

// Regen with confirm
function askRegen(i){
  cfmAction='regen';cfmData=i;
  $('cfmIcon').textContent='🔄';
  $('cfmText').textContent='重新生成这条回复？';
  $('cfmSub').textContent='当前的回复会被替换哦 🍑';
  $('cfmBtn').textContent='确认重新生成';
  $('cfmOv').classList.add('active');
}
async function doRegen(){
  const c=curConv();if(!c||loading)return;
  const i=cfmData;c.messages.splice(i,1);
  lastErr='';loading=true;$('sndBtn').disabled=true;render();
  await callApi(c);loading=false;$('sndBtn').disabled=false;render();
}

// Copy
async function copyMsg(i){
  const text=curMsgs()[i]?.content||'';
  try{await navigator.clipboard.writeText(text)}catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
  const toast=$('copyToast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500);
}

// ============================
// EXPORT / IMPORT / CLEAR
// ============================
function openMenu(){$('menuOv').classList.add('active')}
function closeMenu(){$('menuOv').classList.remove('active')}
function exportC(){
  const c=curConv();if(!c)return;
  const blob=new Blob([JSON.stringify({v:3,conv:c,at:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`peach-${c.title||'chat'}-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);closeMenu();
}
function importC(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.conv&&d.conv.messages){
        // Import as new conversation
        const c={...d.conv,id:uid(),updatedAt:Date.now()};
        convs.unshift(c);curId=c.id;saveConvs();updateHeader();renderSB();render();closeMenu();
      }else if(d.messages){
        // v2 format compatibility
        const c={id:uid(),title:'导入的对话',model:d.model||gModel,messages:d.messages,thinking:{on:false,intensity:'medium'},createdAt:Date.now(),updatedAt:Date.now()};
        convs.unshift(c);curId=c.id;saveConvs();updateHeader();renderSB();render();closeMenu();
      }
    }catch(x){alert('文件格式不对 😣')}
  };r.readAsText(f);inp.value='';
}
function clearC(){
  const c=curConv();if(!c||!c.messages.length)return;
  if(!confirm('清空当前对话的所有消息？')){closeMenu();return}
  c.messages=[];c.title='';lastErr='';saveConvs();renderSB();render();closeMenu();
}

// ============================
// RENDER
// ============================
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function md(s){try{return marked.parse(s)}catch(e){return esc(s)}}

function toggleThinkBlock(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function render(){
  const el=$('msgs');el.innerHTML='';
  const msgs=curMsgs();
  if(!msgs.length&&!loading){
    el.innerHTML='<div class="empty"><span class="empty-e">🍑🌙</span><p class="empty-t">屁桃星连接成功</p><div class="empty-l"></div><p class="empty-h">给屁屁发条消息吧</p></div>';return;
  }
  msgs.forEach((m,i)=>{
    const row=document.createElement('div');row.className=`msg-row ${m.role==='user'?'user':'bot'}`;
    if(m.role==='assistant'){
      const meta=[];
      if(m.model)meta.push(m.model);
      if(m.tok?.t)meta.push(`${m.tok.t.toLocaleString()} tokens`);
      if(m.cost>0)meta.push(`$${m.cost.toFixed(4)}`);
      // Build thinking block if present
      let thinkHtml='';
      if(m.thinking){
        const tid='think_'+i;
        thinkHtml=`<div class="think-block"><button class="think-toggle" onclick="toggleThinkBlock('${tid}')">🧠 屁屁的思考过程 ▾</button><div class="think-content" id="${tid}">${esc(m.thinking)}</div></div>`;
      }
      row.innerHTML=`<span class="avatar">🍑</span><div class="msg-wrap">${thinkHtml}<div class="bubble bot">${md(m.content)}</div>${meta.length?`<div class="msg-meta">${meta.join(' · ')}</div>`:''}<div class="msg-acts"><button onclick="copyMsg(${i})" title="复制">📋</button><button onclick="askRegen(${i})" title="重新生成">🔄</button><button onclick="askDelMsg(${i})" title="删除">🗑️</button></div></div>`;
    }else{
      let img='';
      if(m.atts)m.atts.forEach(a=>{img+=a.type==='image'?`<img class="msg-img" src="${a.data}">`:`<div class="msg-meta">📄 ${esc(a.name)}</div>`});
      row.innerHTML=`<div class="msg-wrap"><div class="bubble user">${esc(m.content)}</div>${img}<div class="msg-acts"><button onclick="openEdit(${i})" title="编辑">✏️</button><button onclick="askDelMsg(${i})" title="删除">🗑️</button></div></div><span class="avatar">🌙</span>`;
    }
    el.appendChild(row);
  });
  if(loading){const r=document.createElement('div');r.className='msg-row bot';r.innerHTML='<span class="avatar">🍑</span><div class="msg-wrap"><div class="bubble bot"><span class="ldots"><span>●</span><span>●</span><span>●</span></span></div></div>';el.appendChild(r)}
  if(lastErr){const e=document.createElement('div');e.className='err-bub';e.textContent='⚠️ '+lastErr;el.appendChild(e)}
  el.scrollTop=el.scrollHeight;
}

// ============================
// UTILS
// ============================
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
// Enter = 换行，只有点🍑才发送
</script>
