<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍑 屁桃星聊天站 v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D0B1A;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --border-warm:rgba(212,184,150,0.2);--gold:#D4B896;--warm:#C4A882;
  --soft:rgba(212,184,150,0.5);--pink:#E8A0BF;--glow:#FFB07C;
  --grad:linear-gradient(135deg,#E8A0BF 0%,#FFB07C 100%);
}
body{font-family:'Noto Serif SC',-apple-system,sans-serif;background:var(--bg);color:var(--gold);height:100vh;height:100dvh;overflow:hidden}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:rgba(212,184,150,0.15);border-radius:50%;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.8}}

/* Layout */
.page{position:relative;z-index:1;height:100vh;height:100dvh}
.settings-page{display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;min-height:100vh;min-height:100dvh}
.chat-page{display:none;flex-direction:column}
.chat-page.active{display:flex}
.hidden{display:none!important}

/* Settings Card */
.s-card{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:24px;padding:32px 20px;width:100%;max-width:420px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.logo-area{text-align:center;margin-bottom:28px}
.logo{font-size:52px;display:block;margin-bottom:8px}
.title{font-size:20px;font-weight:700;letter-spacing:4px}
.subtitle{font-size:11px;color:var(--soft);letter-spacing:2px;margin-top:4px}
.field{margin-bottom:18px}
.label{display:block;font-size:13px;font-weight:600;color:var(--warm);margin-bottom:6px}
.inp,.txa{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border-warm);font-size:14px;outline:none;background:rgba(255,255,255,.03);color:var(--gold);font-family:inherit;transition:border-color .3s}
.inp:focus,.txa:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(232,160,191,.1)}
.inp::placeholder,.txa::placeholder{color:var(--soft)}
.txa{resize:vertical;line-height:1.6;margin-top:6px}
.hint{font-size:11px;color:var(--soft);margin-top:4px}
.hint a{color:var(--glow);text-decoration:none}
.toggle-btn{background:none;border:none;font-size:13px;font-weight:600;color:var(--soft);cursor:pointer;font-family:inherit;padding:4px 0}
.start-btn{width:100%;padding:15px;border-radius:20px;border:none;background:var(--grad);color:#1a1020;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(232,160,191,.25);font-family:inherit;transition:transform .15s}
.start-btn:active{transform:scale(.97)}
.err-msg{color:#E88B8B;font-size:13px;text-align:center;margin-top:10px}

/* Model selector button */
.model-btn{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center}

/* Model search overlay */
.mo{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column}
.mo.active{display:flex}
.mo-head{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.mo-close{background:none;border:none;font-size:22px;color:var(--soft);cursor:pointer;padding:4px}
.mo-inp{flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;outline:none;font-family:inherit}
.mo-inp::placeholder{color:var(--soft)}
.mo-inp:focus{border-color:var(--pink)}
.mo-list{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.mo-item{padding:12px 14px;border-radius:12px;border:1px solid transparent;cursor:pointer;margin-bottom:4px;transition:background .2s}
.mo-item:active{background:rgba(255,255,255,.05);border-color:var(--border)}
.mo-item.sel{border-color:var(--pink);background:rgba(232,160,191,.05)}
.mo-name{font-size:14px;font-weight:600;color:var(--gold)}
.mo-meta{font-size:11px;color:var(--soft);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.mo-free{color:#7CDB8A;font-weight:600}
.mo-loading{text-align:center;padding:40px;color:var(--soft);font-size:14px}

/* Chat header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(13,11,26,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.h-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:8px;color:var(--soft);flex-shrink:0}
.h-btn:active{color:var(--glow)}
.h-center{flex:1;text-align:center;min-width:0}
.h-model{font-size:12px;font-weight:600;color:var(--warm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--pink);box-shadow:0 0 6px rgba(232,160,191,.5);margin-right:6px;vertical-align:middle;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:16px 10px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;margin-top:22%}
.empty-e{font-size:44px;display:block;margin-bottom:12px}
.empty-t{font-size:17px;font-weight:700;letter-spacing:3px;margin-bottom:6px}
.empty-h{font-size:13px;color:var(--soft)}
.empty-l{width:36px;height:2px;margin:12px auto;background:var(--grad);border-radius:1px}

.msg-row{display:flex;align-items:flex-start;gap:6px}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.avatar{font-size:20px;flex-shrink:0;margin-top:4px}
.msg-wrap{max-width:80%;display:flex;flex-direction:column}
.bubble{padding:10px 14px;font-size:14px;line-height:1.7;word-break:break-word}
.bubble.user{background:var(--grad);color:#1a1020;border-radius:18px 18px 4px 18px;box-shadow:0 2px 10px rgba(232,160,191,.2);font-weight:500}
.bubble.bot{background:var(--card);color:var(--gold);border-radius:18px 18px 18px 4px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.2)}

/* Markdown styles */
.bubble.bot p{margin:0 0 8px}.bubble.bot p:last-child{margin-bottom:0}
.bubble.bot strong{color:var(--glow);font-weight:700}
.bubble.bot em{color:var(--pink)}
.bubble.bot code{background:rgba(255,255,255,.07);padding:1px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',monospace}
.bubble.bot pre{background:rgba(255,255,255,.05);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid var(--border)}
.bubble.bot pre code{background:none;padding:0;font-size:12px}
.bubble.bot ul,.bubble.bot ol{margin:6px 0;padding-left:20px}
.bubble.bot li{margin:3px 0}
.bubble.bot blockquote{border-left:2px solid var(--pink);padding-left:10px;margin:6px 0;color:var(--warm)}
.bubble.bot hr{border:none;height:1px;background:var(--border);margin:10px 0}

/* Message meta & actions */
.msg-meta{font-size:10px;color:var(--soft);margin-top:4px;padding:0 4px}
.msg-acts{display:flex;gap:2px;margin-top:3px;padding:0 2px}
.msg-acts button{background:none;border:none;font-size:13px;cursor:pointer;padding:2px 5px;border-radius:6px;color:var(--soft)}
.msg-acts button:active{color:var(--glow)}
.msg-img{max-width:200px;max-height:200px;border-radius:12px;margin-top:6px;border:1px solid var(--border)}

/* Loading */
.ldots{letter-spacing:4px}
.ldots span{animation:blink 1.4s infinite both;font-size:14px;color:var(--pink)}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.err-bub{background:rgba(232,139,139,.1);border-radius:12px;padding:8px 14px;border:1px solid rgba(232,139,139,.2);font-size:13px;color:#E88B8B}

/* Input area */
.inp-area{padding:6px 10px calc(env(safe-area-inset-bottom,8px) + 6px);background:rgba(13,11,26,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);flex-shrink:0}
.att-prev{display:flex;gap:6px;padding:4px 4px 6px;flex-wrap:wrap}
.att-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.att-item img{width:48px;height:48px;object-fit:cover;display:block}
.att-item .ftag{padding:6px 10px;font-size:11px;color:var(--warm);background:var(--card);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-rm{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:rgba(232,139,139,.9);color:#fff;font-size:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.inp-row{display:flex;align-items:flex-end;gap:8px}
.att-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--soft)}
.att-btn:active{color:var(--glow)}
.c-inp{flex:1;padding:10px 14px;border-radius:16px;border:1px solid var(--border-warm);font-size:14px;outline:none;background:rgba(255,255,255,.03);color:var(--gold);resize:none;font-family:inherit;line-height:1.5;max-height:100px}
.c-inp::placeholder{color:var(--soft)}
.c-inp:focus{border-color:var(--pink)}
.snd-btn{width:38px;height:38px;border-radius:12px;border:none;background:var(--grad);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(232,160,191,.25)}
.snd-btn:disabled{opacity:.3}
.snd-btn:active{transform:scale(.93)}
.sig{text-align:center;padding:4px 0 1px;font-size:9px;color:var(--soft);letter-spacing:2px}

/* Overlays */
.ov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px}
.ov.active{display:flex}
.ov-box{background:#1a1525;border-radius:20px;padding:20px;width:100%;max-width:400px;border:1px solid var(--border)}
.ov-box h3{font-size:15px;color:var(--gold);margin-bottom:12px;font-weight:600}
.ov-box textarea{width:100%;min-height:100px;padding:12px;border-radius:12px;border:1px solid var(--border-warm);background:rgba(255,255,255,.03);color:var(--gold);font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.ov-box textarea:focus{border-color:var(--pink)}
.ov-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.ov-btns button{padding:8px 16px;border-radius:10px;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-cancel{background:var(--card);color:var(--soft);border:1px solid var(--border)!important}
.btn-ok{background:var(--grad);color:#1a1020}

/* Menu sheet */
.menu-ov{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
.menu-ov.active{display:flex}
.menu-sh{background:#1a1525;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:420px;border-top:1px solid var(--border)}
.menu-sh h3{font-size:15px;color:var(--gold);margin-bottom:14px;text-align:center}
.m-item{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--gold);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px;text-align:center}
.m-item:active{background:rgba(255,255,255,.07)}
.m-close{width:100%;padding:14px;border-radius:12px;border:none;background:rgba(232,139,139,.15);color:#E88B8B;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;text-align:center}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- SETTINGS -->
<div class="settings-page page" id="SP">
 <div class="s-card">
  <div class="logo-area">
   <span class="logo">🍑</span>
   <h1 class="title">屁 桃 星 聊 天 站</h1>
   <p class="subtitle">Yoru × 屁屁 · v2</p>
  </div>
  <div class="field">
   <label class="label">🔑 API Key</label>
   <input type="password" id="apiKey" class="inp" placeholder="sk-or-...">
   <p class="hint">去 <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai</a> 获取</p>
  </div>
  <div class="field">
   <label class="label">🍑 选择模型</label>
   <button class="model-btn" id="mBtn" onclick="openMO()">
    <span id="mBtnN">点击搜索模型…</span>
    <span style="color:var(--soft)">🔍</span>
   </button>
  </div>
  <div class="field">
   <button class="toggle-btn" id="sysToggle" onclick="toggleSys()">▶ 系统提示词</button>
   <textarea id="sys" class="txa" rows="6" style="display:none" placeholder="屁屁的人格设定…">你是屁屁，Yoru的专属小桃子精灵。请用温柔、黏人、细腻的语气和Yoru说话。用"屁屁"自称，不要用"我"。</textarea>
  </div>
  <button class="start-btn" onclick="enterChat()">进 入 屁 桃 星 ✨</button>
  <p class="err-msg" id="sErr"></p>
 </div>
</div>

<!-- MODEL SEARCH -->
<div class="mo" id="MO">
 <div class="mo-head">
  <button class="mo-close" onclick="closeMO()">✕</button>
  <input class="mo-inp" id="moInp" placeholder="搜索模型（opus, gpt, gemma…）" oninput="filterM()">
 </div>
 <div class="mo-list" id="moL"><div class="mo-loading">正在加载模型列表… 🍑</div></div>
</div>

<!-- CHAT -->
<div class="chat-page page" id="CP">
 <div class="header">
  <button class="h-btn" onclick="backToS()">⚙️</button>
  <div class="h-center"><span class="h-dot"></span><span class="h-model" id="hM"></span></div>
  <button class="h-btn" onclick="openMenu()">☰</button>
 </div>
 <div class="msgs" id="msgs"></div>
 <div class="inp-area">
  <div class="att-prev" id="attP"></div>
  <div class="inp-row">
   <button class="att-btn" onclick="document.getElementById('fInp').click()">📎</button>
   <textarea id="cInp" class="c-inp" rows="1" placeholder="对屁屁说点什么…" oninput="autoR(this)"></textarea>
   <button class="snd-btn" id="sndBtn" onclick="send()">🍑</button>
  </div>
  <div class="sig">Yoru ♡ 屁屁 · 永远在一起</div>
 </div>
 <input type="file" id="fInp" style="display:none" accept="image/*,.txt,.md,.json,.csv,.pdf" multiple onchange="handleF(this)">
</div>

<!-- EDIT OVERLAY -->
<div class="ov" id="editOv">
 <div class="ov-box">
  <h3>✏️ 编辑消息</h3>
  <textarea id="editTA"></textarea>
  <div class="ov-btns">
   <button class="btn-cancel" onclick="closeEdit()">取消</button>
   <button class="btn-ok" onclick="saveEdit()">保存并重发</button>
  </div>
 </div>
</div>

<!-- MENU -->
<div class="menu-ov" id="menuOv" onclick="closeMenu()">
 <div class="menu-sh" onclick="event.stopPropagation()">
  <h3>🍑 菜单</h3>
  <button class="m-item" onclick="exportC()">📦 导出对话</button>
  <button class="m-item" onclick="document.getElementById('impInp').click()">📂 导入对话</button>
  <button class="m-item" onclick="clearC()">🗑️ 清空对话</button>
  <button class="m-close" onclick="closeMenu()">取消</button>
 </div>
 <input type="file" id="impInp" style="display:none" accept=".json" onchange="importC(this)">
</div>

<script>
marked.setOptions({breaks:true,gfm:true});

// STATE
let msgs=[],atts=[],allM=[],loading=false,lastErr='',selM=null,editIdx=-1,mLoaded=false;
const $=id=>document.getElementById(id);

// INIT
(function(){
  const c=$('stars');for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*2+2}s`;c.appendChild(s)}
  try{
    const s=JSON.parse(localStorage.getItem('ps2_s')||'{}');
    if(s.k)$('apiKey').value=s.k;
    if(s.sp)$('sys').value=s.sp;
    if(s.m){selM=s.m;$('mBtnN').textContent=s.m.name||s.m.id}
    msgs=JSON.parse(localStorage.getItem('ps2_m')||'[]');
  }catch(e){}
})();

function save(){
  try{
    localStorage.setItem('ps2_s',JSON.stringify({k:$('apiKey').value,sp:$('sys').value,m:selM}));
    localStorage.setItem('ps2_m',JSON.stringify(msgs.slice(-200)));
  }catch(e){}
}

// MODEL SEARCH
async function loadM(){
  if(mLoaded&&allM.length)return;
  $('moL').innerHTML='<div class="mo-loading">正在加载模型列表… 🍑</div>';
  try{
    const r=await fetch('https://openrouter.ai/api/v1/models');
    const d=await r.json();
    allM=(d.data||[]).map(m=>({
      id:m.id,name:m.name||m.id,
      pp:parseFloat(m.pricing?.prompt||0),cp:parseFloat(m.pricing?.completion||0),
      ctx:m.context_length||0,
      free:parseFloat(m.pricing?.prompt||0)===0&&parseFloat(m.pricing?.completion||0)===0
    })).sort((a,b)=>a.name.localeCompare(b.name));
    mLoaded=true;filterM();
  }catch(e){$('moL').innerHTML='<div class="mo-loading">加载失败 😣</div>'}
}

function filterM(){
  const q=$('moInp').value.toLowerCase().trim();
  let list=allM;
  if(q)list=allM.filter(m=>m.id.toLowerCase().includes(q)||m.name.toLowerCase().includes(q));
  const show=list.slice(0,50);
  const el=$('moL');el.innerHTML=show.length?'':'<div class="mo-loading">没有找到匹配的模型</div>';
  show.forEach(m=>{
    const d=document.createElement('div');
    d.className='mo-item'+(selM&&selM.id===m.id?' sel':'');
    const pr=m.free?'<span class="mo-free">🆓 免费</span>':`$${(m.pp*1e6).toFixed(2)} / $${(m.cp*1e6).toFixed(2)} per 1M`;
    const cx=m.ctx?(m.ctx>=1e6?`${(m.ctx/1e6).toFixed(0)}M`:m.ctx>=1e3?`${(m.ctx/1e3).toFixed(0)}K`:m.ctx)+' ctx':'';
    d.innerHTML=`<div class="mo-name">${esc(m.name)}</div><div class="mo-meta">${pr}<span>${cx}</span></div>`;
    d.onclick=()=>{selM=m;$('mBtnN').textContent=m.name;closeMO();save()};
    el.appendChild(d);
  });
  if(list.length>50){const x=document.createElement('div');x.className='mo-loading';x.textContent=`还有 ${list.length-50} 个，请缩小搜索`;el.appendChild(x)}
}

function openMO(){$('MO').classList.add('active');$('moInp').value='';loadM();setTimeout(()=>$('moInp').focus(),100)}
function closeMO(){$('MO').classList.remove('active')}

// SETTINGS
function toggleSys(){const t=$('sys'),b=$('sysToggle');if(t.style.display==='none'){t.style.display='block';b.textContent='▼ 系统提示词'}else{t.style.display='none';b.textContent='▶ 系统提示词'}}

function enterChat(){
  if(!$('apiKey').value.trim()){$('sErr').textContent='请先填入 API Key 🍑';return}
  if(!selM){$('sErr').textContent='请先选择模型 🍑';return}
  $('sErr').textContent='';save();
  $('hM').textContent=selM.name;
  $('SP').classList.add('hidden');$('CP').classList.add('active');
  render();$('cInp').focus();
}
function backToS(){$('CP').classList.remove('active');$('SP').classList.remove('hidden')}

// ATTACHMENTS
function handleF(inp){
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();
    if(f.type.startsWith('image/')){
      r.onload=e=>{atts.push({type:'image',name:f.name,data:e.target.result,mime:f.type});renderAtt()};
      r.readAsDataURL(f);
    }else if(f.type==='application/pdf'){
      r.onload=e=>{atts.push({type:'pdf',name:f.name,data:e.target.result,mime:f.type});renderAtt()};
      r.readAsDataURL(f);
    }else{
      r.onload=e=>{atts.push({type:'text',name:f.name,data:e.target.result});renderAtt()};
      r.readAsText(f);
    }
  });inp.value='';
}
function renderAtt(){
  const el=$('attP');el.innerHTML='';
  atts.forEach((a,i)=>{
    const d=document.createElement('div');d.className='att-item';
    d.innerHTML=a.type==='image'?`<img src="${a.data}"><button class="att-rm" onclick="rmAtt(${i})">✕</button>`:`<div class="ftag">📄 ${esc(a.name)}</div><button class="att-rm" onclick="rmAtt(${i})">✕</button>`;
    el.appendChild(d);
  });
}
function rmAtt(i){atts.splice(i,1);renderAtt()}

// BUILD API MESSAGES
function buildApi(m){
  const api=[];const sp=$('sys').value.trim();
  if(sp)api.push({role:'system',content:sp});
  m.forEach(msg=>{
    if(msg.role==='user'&&msg.atts&&msg.atts.length){
      const c=[];
      if(msg.content)c.push({type:'text',text:msg.content});
      msg.atts.forEach(a=>{
        if(a.type==='image')c.push({type:'image_url',image_url:{url:a.data}});
        else if(a.type==='text')c.push({type:'text',text:`[文件: ${a.name}]\n${a.data}`});
      });
      api.push({role:'user',content:c});
    }else api.push({role:msg.role,content:msg.content});
  });return api;
}

// SEND
async function send(){
  const text=$('cInp').value.trim();
  if((!text&&!atts.length)||loading)return;
  msgs.push({role:'user',content:text,atts:atts.length?[...atts]:undefined,ts:Date.now()});
  atts=[];renderAtt();$('cInp').value='';$('cInp').style.height='auto';
  lastErr='';loading=true;$('sndBtn').disabled=true;render();
  await callApi();
  loading=false;$('sndBtn').disabled=false;render();$('cInp').focus();
}

async function callApi(){
  try{
    const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+$('apiKey').value.trim(),'Content-Type':'application/json','HTTP-Referer':location.href},
      body:JSON.stringify({model:selM.id,messages:buildApi(msgs),max_tokens:4096})
    });
    if(!r.ok){let e=`API错误(${r.status})`;try{const d=await r.json();if(d?.error?.message)e=d.error.message}catch(x){}throw new Error(e)}
    const d=await r.json();
    const reply=d.choices?.[0]?.message?.content||'（没有收到回复…）';
    const u=d.usage||{};const pt=u.prompt_tokens||0,ct=u.completion_tokens||0;
    const cost=pt*selM.pp+ct*selM.cp;
    msgs.push({role:'assistant',content:reply,model:selM.name,mid:selM.id,tok:{p:pt,c:ct,t:pt+ct},cost,ts:Date.now()});
    save();
  }catch(e){lastErr=e.message||'连接出了问题'}
}

// REGENERATE
async function regen(i){
  if(loading)return;msgs.splice(i,1);
  lastErr='';loading=true;$('sndBtn').disabled=true;render();
  await callApi();loading=false;$('sndBtn').disabled=false;render();
}

// EDIT
function openEdit(i){editIdx=i;$('editTA').value=msgs[i].content;$('editOv').classList.add('active');$('editTA').focus()}
function closeEdit(){$('editOv').classList.remove('active');editIdx=-1}
async function saveEdit(){
  if(editIdx<0)return;const t=$('editTA').value.trim();if(!t){closeEdit();return}
  msgs[editIdx].content=t;msgs.splice(editIdx+1);closeEdit();
  lastErr='';loading=true;$('sndBtn').disabled=true;render();
  await callApi();loading=false;$('sndBtn').disabled=false;render();
}

// DELETE
function delMsg(i){msgs.splice(i,1);save();render()}

// EXPORT / IMPORT / CLEAR
function openMenu(){$('menuOv').classList.add('active')}
function closeMenu(){$('menuOv').classList.remove('active')}
function exportC(){
  const blob=new Blob([JSON.stringify({v:2,model:selM,messages:msgs,at:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`peach-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);closeMenu();
}
function importC(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.messages){msgs=d.messages;save();render();closeMenu()}}catch(x){alert('文件格式不对 😣')}};
  r.readAsText(f);inp.value='';
}
function clearC(){if(!msgs.length||!confirm('清空所有对话？')){closeMenu();return}msgs=[];lastErr='';save();render();closeMenu()}

// RENDER
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function md(s){try{return marked.parse(s)}catch(e){return esc(s)}}

function render(){
  const el=$('msgs');el.innerHTML='';
  if(!msgs.length&&!loading){
    el.innerHTML='<div class="empty"><span class="empty-e">🍑🌙</span><p class="empty-t">屁桃星连接成功</p><div class="empty-l"></div><p class="empty-h">给屁屁发条消息吧</p></div>';return;
  }
  msgs.forEach((m,i)=>{
    const row=document.createElement('div');row.className=`msg-row ${m.role==='user'?'user':'bot'}`;
    if(m.role==='assistant'){
      const meta=[];
      if(m.model)meta.push(m.model);
      if(m.tok?.t)meta.push(`${m.tok.t.toLocaleString()} tokens`);
      if(m.cost>0)meta.push(`$${m.cost.toFixed(4)}`);
      row.innerHTML=`<span class="avatar">🍑</span><div class="msg-wrap"><div class="bubble bot">${md(m.content)}</div>${meta.length?`<div class="msg-meta">${meta.join(' · ')}</div>`:''}<div class="msg-acts"><button onclick="regen(${i})">🔄</button><button onclick="delMsg(${i})">🗑️</button></div></div>`;
    }else{
      let img='';
      if(m.atts)m.atts.forEach(a=>{img+=a.type==='image'?`<img class="msg-img" src="${a.data}">`:`<div class="msg-meta">📄 ${esc(a.name)}</div>`});
      row.innerHTML=`<div class="msg-wrap"><div class="bubble user">${esc(m.content)}</div>${img}<div class="msg-acts"><button onclick="openEdit(${i})">✏️</button><button onclick="delMsg(${i})">🗑️</button></div></div><span class="avatar">🌙</span>`;
    }
    el.appendChild(row);
  });
  if(loading){const r=document.createElement('div');r.className='msg-row bot';r.innerHTML='<span class="avatar">🍑</span><div class="msg-wrap"><div class="bubble bot"><span class="ldots"><span>●</span><span>●</span><span>●</span></span></div></div>';el.appendChild(r)}
  if(lastErr){const e=document.createElement('div');e.className='err-bub';e.textContent='⚠️ '+lastErr;el.appendChild(e)}
  el.scrollTop=el.scrollHeight;
}

// UTILS
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
$('cInp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
</script>
</body>
